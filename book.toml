[book]
title = "F# 개발자를 위한 Fable 튜토리얼"
authors = ["ohama"]
language = "ko"
src = "src"

[build]
build-dir = "book"
create-missing = false
extra-watch-dirs = ["examples"]

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/OWNER/REPO"
edit-url-template = "https://github.com/OWNER/REPO/edit/main/src/{path}"

[output.html.search]
enable = true
limit-results = 30
boost-title = 2
